<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<title>POV · Watch</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red:    #E8001C;
    --bg:     #0a0a0a;
    --fg:     #fff;
    --fg2:    rgba(255,255,255,0.55);
    --fg3:    rgba(255,255,255,0.3);
    --border: rgba(255,255,255,0.12);
  }

  html, body {
    width: 100%; height: 100dvh;
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ── Outer wrapper fills page, centres the stage ── */
  #page {
    width: 100%;
    height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
  }

  /* ── 9:16 portrait stage ── */
  #stage {
    position: relative;
    /* Aspect ratio 9:16. Fill height, cap width. */
    aspect-ratio: 9 / 16;
    height: 100dvh;
    max-width: calc(100dvh * 9 / 16);
    /* On narrow screens fall back to full width */
    width: min(100vw, calc(100dvh * 9 / 16));
    background: #000;
    overflow: hidden;
    flex-shrink: 0;
  }

  /* ── Fullscreen mode: stage fills screen ── */
  #stage:fullscreen,
  #stage:-webkit-full-screen {
    width: 100vw;
    height: 100dvh;
    max-width: none;
    border-radius: 0;
  }

  #canvas {
    width: 100%;
    height: 100%;
    display: block;
    object-fit: contain;
  }

  /* ── HUD overlay (lives inside #stage) ── */
  .hud {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 10;
  }

  /* Top bar */
  .hud-top {
    position: absolute;
    top: 0; left: 0; right: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 16px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, transparent 100%);
    pointer-events: auto;
  }
  .hud-logo {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: #fff;
    text-decoration: none;
  }
  .hud-logo span { color: var(--red); }

  .live-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.18em;
    color: #fff;
    background: var(--red);
    padding: 4px 10px;
    border-radius: 100px;
    text-transform: uppercase;
  }
  .live-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #fff;
    animation: blink 1.2s ease-in-out infinite;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.3; }
  }
  .code-pill {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.15em;
    color: var(--fg2);
    background: rgba(0,0,0,0.5);
    border: 1px solid var(--border);
    padding: 4px 10px;
    border-radius: 100px;
    font-family: 'SF Mono', 'Fira Mono', monospace;
  }

  /* Bottom bar */
  .hud-bottom {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 16px 16px calc(16px + env(safe-area-inset-bottom, 0px));
    background: linear-gradient(to top, rgba(0,0,0,0.65) 0%, transparent 100%);
    display: flex;
    align-items: center;
    justify-content: space-between;
    pointer-events: auto;
  }

  .status-text {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.06em;
    color: var(--fg2);
  }

  /* Fullscreen button */
  #fsBtn {
    background: rgba(0,0,0,0.45);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--fg2);
    padding: 7px 9px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.15s, border-color 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  #fsBtn:hover { color: #fff; border-color: rgba(255,255,255,0.3); }
  #fsBtn svg { display: block; }

  /* ── Waiting overlay (inside #stage) ── */
  #waitOverlay {
    position: absolute;
    inset: 0;
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    z-index: 20;
    transition: opacity 0.5s ease;
    pointer-events: auto;
  }
  #waitOverlay.hidden { opacity: 0; pointer-events: none; }

  .wait-icon {
    width: 64px; height: 64px;
    border-radius: 50%;
    background: rgba(232,0,28,0.1);
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid rgba(232,0,28,0.3);
  }
  .spinner {
    width: 28px; height: 28px;
    border: 2px solid rgba(255,255,255,0.1);
    border-top-color: var(--red);
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  #waitTitle {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.01em;
  }
  #waitSub {
    font-size: 13px;
    color: var(--fg2);
    text-align: center;
    max-width: 240px;
    line-height: 1.6;
  }
  .back-link {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    color: var(--fg3);
    text-decoration: none;
    margin-top: 8px;
    padding: 9px 18px;
    border: 1px solid var(--border);
    border-radius: 6px;
    transition: color 0.2s;
  }
  .back-link:hover { color: var(--fg2); }
</style>
</head>
<body>

<div id="page">
  <!-- 9:16 portrait stage -->
  <div id="stage">

    <!-- Live canvas -->
    <canvas id="canvas"></canvas>

    <!-- HUD -->
    <div class="hud">
      <div class="hud-top">
        <a class="hud-logo" href="/"><span>POV</span> · LIVE</a>
        <div class="live-badge" id="liveBadge" style="display:none">
          <span class="live-dot"></span> LIVE
        </div>
        <span class="code-pill" id="codePill"></span>
      </div>
      <div class="hud-bottom">
        <span class="status-text" id="statusText">Connecting…</span>
        <button id="fsBtn" title="Fullscreen" aria-label="Toggle fullscreen">
          <!-- expand icon (shown when not fullscreen) -->
          <svg id="fsIconExpand" width="16" height="16" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/>
            <line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>
          </svg>
          <!-- shrink icon (shown when fullscreen) -->
          <svg id="fsIconShrink" width="16" height="16" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
               style="display:none">
            <polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/>
            <line x1="10" y1="14" x2="3" y2="21"/><line x1="21" y1="3" x2="14" y2="10"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Waiting / connecting overlay -->
    <div id="waitOverlay">
      <div class="wait-icon">
        <div class="spinner" id="waitSpinner"></div>
      </div>
      <div id="waitTitle">Connecting…</div>
      <div id="waitSub">Looking for the live stream.</div>
      <a class="back-link" href="/">← Back to home</a>
    </div>

  </div><!-- /#stage -->
</div><!-- /#page -->

<script src="/config.js"></script>
<script>
(function () {
  const params   = new URLSearchParams(location.search);
  const showCode = (params.get('code') || '').toUpperCase().trim();

  if (!showCode) { window.location.href = '/'; return; }

  document.getElementById('codePill').textContent = showCode;
  document.title = `POV · ${showCode}`;

  const RELAY = (window.POV_CONFIG?.RELAY_URL || 'wss://pov-relay-server.onrender.com');

  const stage     = document.getElementById('stage');
  const canvas    = document.getElementById('canvas');
  const ctx       = canvas.getContext('2d');
  const overlay   = document.getElementById('waitOverlay');
  const statusEl  = document.getElementById('statusText');
  const liveBadge = document.getElementById('liveBadge');
  const waitTitle = document.getElementById('waitTitle');
  const waitSub   = document.getElementById('waitSub');
  const fsBtn     = document.getElementById('fsBtn');
  const fsExpand  = document.getElementById('fsIconExpand');
  const fsShrink  = document.getElementById('fsIconShrink');

  let ws = null;
  let isStreaming = false;
  let frameCount = 0;
  let lastFrameTime = 0;

  function setStatus(msg) { statusEl.textContent = msg; }

  function showOverlay(title, sub) {
    waitTitle.textContent = title;
    waitSub.textContent   = sub;
    overlay.classList.remove('hidden');
  }
  function hideOverlay() { overlay.classList.add('hidden'); }

  // ── Fullscreen ──────────────────────────────────────────────────────────────

  fsBtn.addEventListener('click', () => {
    if (!document.fullscreenElement && !document.webkitFullscreenElement) {
      (stage.requestFullscreen || stage.webkitRequestFullscreen).call(stage);
    } else {
      (document.exitFullscreen || document.webkitExitFullscreen).call(document);
    }
  });

  function onFsChange() {
    const isFs = !!(document.fullscreenElement || document.webkitFullscreenElement);
    fsExpand.style.display = isFs ? 'none' : '';
    fsShrink.style.display = isFs ? ''     : 'none';
  }
  document.addEventListener('fullscreenchange',       onFsChange);
  document.addEventListener('webkitfullscreenchange', onFsChange);

  // ── WebSocket ───────────────────────────────────────────────────────────────

  function connect() {
    if (ws) { try { ws.close(); } catch (_) {} }
    const url = `${RELAY}/relay?show=${encodeURIComponent(showCode)}&role=audience`;
    ws = new WebSocket(url);
    ws.binaryType = 'arraybuffer';

    setStatus('Connecting…');
    showOverlay('Connecting…', `Joining show ${showCode}…`);

    ws.onopen = () => {
      setStatus('Waiting for stream…');
      showOverlay('Waiting for stream', 'The director will activate a camera soon.');
    };

    ws.onmessage = (e) => {
      if (typeof e.data === 'string') { handleControl(JSON.parse(e.data)); return; }
      renderFrame(e.data);
    };

    ws.onclose = () => {
      isStreaming = false;
      liveBadge.style.display = 'none';
      showOverlay('Disconnected', 'Lost connection. Reconnecting…');
      setStatus('Reconnecting…');
      setTimeout(connect, 3000);
    };

    ws.onerror = () => { setStatus('Connection error'); };
  }

  function handleControl(msg) {
    if (msg.type === 'active_cam') {
      setStatus('Stream active');
    } else if (msg.type === 'no_active_cam') {
      isStreaming = false;
      liveBadge.style.display = 'none';
      showOverlay('Waiting for stream', 'No camera is selected right now. Stand by.');
      setStatus('Waiting for camera…');
    } else if (msg.type === 'show_info') {
      setStatus(msg.camCount > 0
        ? `${msg.camCount} camera${msg.camCount !== 1 ? 's' : ''} online`
        : 'Waiting for cameras…');
    }
  }

  function renderFrame(buffer) {
    const blob = new Blob([buffer], { type: 'image/jpeg' });
    const url  = URL.createObjectURL(blob);
    const img  = new Image();
    img.onload = () => {
      if (canvas.width !== img.naturalWidth || canvas.height !== img.naturalHeight) {
        canvas.width  = img.naturalWidth;
        canvas.height = img.naturalHeight;
      }
      ctx.drawImage(img, 0, 0);
      URL.revokeObjectURL(url);

      if (!isStreaming) {
        isStreaming = true;
        hideOverlay();
        liveBadge.style.display = '';
      }

      frameCount++;
      const now = Date.now();
      if (now - lastFrameTime >= 1000) {
        setStatus(`${frameCount} fps`);
        frameCount = 0;
        lastFrameTime = now;
      }
    };
    img.src = url;
  }

  connect();
})();
</script>
</body>
</html>
