<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<title>POV · Director</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red:    #E8001C;
    --green:  #00C853;
    --bg:     #000;
    --bg1:    #0f0f0f;
    --bg2:    #1a1a1a;
    --fg:     #fff;
    --fg2:    rgba(255,255,255,0.55);
    --fg3:    rgba(255,255,255,0.28);
    --border: rgba(255,255,255,0.1);
    --radius: 6px;
  }

  html, body {
    min-height: 100dvh;
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Nav ── */
  nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    background: rgba(0,0,0,0.9);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    position: sticky;
    top: 0;
    z-index: 50;
  }
  .nav-left { display: flex; align-items: center; gap: 16px; }
  .logo {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--fg);
    text-decoration: none;
    white-space: nowrap;
  }
  .logo span { color: var(--red); }

  .conn-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #555;
    transition: background 0.4s;
    flex-shrink: 0;
  }
  .conn-dot.connected { background: var(--green); }
  .conn-dot.error     { background: var(--red); }

  .nav-right { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }

  .pill {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.15em;
    padding: 5px 12px;
    border-radius: 100px;
    border: 1px solid var(--border);
    color: var(--fg2);
    white-space: nowrap;
    font-family: 'SF Mono', monospace;
  }
  .pill.show-code { color: var(--fg); border-color: rgba(255,255,255,0.25); }

  .audience-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: var(--fg2);
  }

  /* ── Code entry ── */
  #codeGate {
    min-height: calc(100dvh - 57px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    padding: 40px 24px;
  }
  .gate-title {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.01em;
  }
  .gate-sub {
    font-size: 14px;
    color: var(--fg2);
    text-align: center;
    line-height: 1.6;
    max-width: 340px;
  }
  .gate-input {
    background: var(--bg1);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 24px;
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 0.25em;
    color: var(--fg);
    text-transform: uppercase;
    outline: none;
    font-family: 'SF Mono', monospace;
    text-align: center;
    width: 100%;
    max-width: 340px;
    transition: border-color 0.2s;
  }
  .gate-input:focus { border-color: var(--red); }
  .gate-input::placeholder { color: var(--fg3); font-size: 22px; letter-spacing: 0.12em; }

  .btn-enter {
    background: var(--red);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    padding: 14px 32px;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    width: 100%;
    max-width: 340px;
  }
  .btn-enter:hover   { background: #b50016; }
  .btn-enter:active  { transform: scale(0.97); }
  .btn-enter:disabled { background: var(--bg2); color: var(--fg3); cursor: not-allowed; transform: none; }

  /* ── Main dashboard ── */
  #dashboard { display: none; }

  /* ── Camera grid ── */
  .grid-area {
    padding: 20px;
  }

  .grid-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    flex-wrap: wrap;
    gap: 10px;
  }
  .grid-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.2em;
    color: var(--fg3);
    text-transform: uppercase;
  }
  .active-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: var(--green);
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .active-label-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.7)} }

  .cam-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }
  @media (max-width: 700px) {
    .cam-grid { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 420px) {
    .cam-grid { grid-template-columns: 1fr; }
  }

  /* ── Camera tile ── */
  .cam-tile {
    position: relative;
    background: var(--bg1);
    border: 2px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    cursor: pointer;
    aspect-ratio: 16/9;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .cam-tile:hover {
    border-color: rgba(255,255,255,0.25);
  }
  .cam-tile.active {
    border-color: var(--green);
    box-shadow: 0 0 0 1px var(--green), 0 0 24px rgba(0,200,83,0.2);
  }
  .cam-tile canvas {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .cam-tile .placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .cam-icon {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: rgba(255,255,255,0.05);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--fg3);
  }

  .cam-footer {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 8px 10px;
    background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 100%);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 6px;
  }
  .cam-name {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: #fff;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
  }
  .cam-badge {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.12em;
    padding: 3px 7px;
    border-radius: 3px;
    flex-shrink: 0;
  }
  .cam-badge.live { background: var(--red); color: #fff; }
  .cam-badge.on-air { background: var(--green); color: #fff; }
  .cam-badge.idle { background: rgba(255,255,255,0.1); color: var(--fg2); }

  .cam-num {
    position: absolute;
    top: 8px; left: 8px;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: rgba(255,255,255,0.5);
    background: rgba(0,0,0,0.5);
    padding: 2px 6px;
    border-radius: 3px;
  }

  /* ── Active-cam panel (selected view) ── */
  .active-panel {
    margin: 0 20px 20px;
    background: var(--bg1);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  .active-panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
  }
  .active-panel-title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.18em;
    color: var(--green);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .panel-name {
    font-size: 12px;
    font-weight: 600;
    color: var(--fg2);
  }
  #activeCanvas {
    width: 100%;
    aspect-ratio: 16/9;
    display: block;
    background: #000;
    object-fit: contain;
  }

  /* ── Empty state ── */
  .empty-state {
    padding: 60px 20px;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }
  .empty-icon {
    width: 64px; height: 64px;
    border-radius: 50%;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--fg3);
  }
  .empty-title {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.01em;
  }
  .empty-sub {
    font-size: 13px;
    color: var(--fg2);
    line-height: 1.6;
    max-width: 280px;
  }
  .share-row {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 14px;
    font-family: 'SF Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    color: var(--fg);
  }
  .copy-btn {
    background: var(--red);
    color: #fff;
    border: none;
    border-radius: 4px;
    padding: 5px 12px;
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.05em;
    white-space: nowrap;
  }
  .copy-btn:active { opacity: 0.8; }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--bg1);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 20px;
    font-size: 13px;
    font-weight: 600;
    color: var(--fg);
    white-space: nowrap;
    transition: transform 0.3s ease, opacity 0.3s ease;
    opacity: 0;
    z-index: 200;
    pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
</style>
</head>
<body>

<nav>
  <div class="nav-left">
    <a class="logo" href="/"><span>POV</span> · DIRECTOR</a>
    <div class="conn-dot" id="connDot"></div>
  </div>
  <div class="nav-right">
    <span class="pill show-code" id="navCode" style="display:none"></span>
    <span class="audience-pill" id="audiencePill" style="display:none">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      <span id="audienceNum">0</span> watching
    </span>
  </div>
</nav>

<!-- Code gate -->
<div id="codeGate">
  <div class="gate-title">Director Login</div>
  <div class="gate-sub">Enter the show code to open your director dashboard and control the live feed.</div>
  <input class="gate-input" id="gateInput" type="text" maxlength="8" placeholder="ABC123"
    autocomplete="off" autocapitalize="characters" spellcheck="false">
  <button class="btn-enter" id="gateBtn" disabled onclick="enterShow()">Open Dashboard →</button>
</div>

<!-- Main dashboard (hidden until code entered) -->
<div id="dashboard">

  <!-- Active feed preview -->
  <div class="active-panel" id="activePanel" style="display:none">
    <div class="active-panel-header">
      <div class="active-panel-title">
        <span style="width:6px;height:6px;border-radius:50%;background:var(--green)"></span>
        ON AIR — audience is watching
      </div>
      <span class="panel-name" id="activePanelName"></span>
    </div>
    <canvas id="activeCanvas"></canvas>
  </div>

  <!-- Camera grid -->
  <div class="grid-area">
    <div class="grid-header">
      <span class="grid-label" id="gridLabel">Waiting for cameras…</span>
      <span class="active-label" id="activeLabel" style="display:none">
        <span class="active-label-dot"></span>
        Click a tile to switch feed
      </span>
    </div>
    <div class="cam-grid" id="camGrid"></div>
    <div id="emptyState" class="empty-state">
      <div class="empty-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
      </div>
      <div class="empty-title">No cameras yet</div>
      <div class="empty-sub">Share the watch link so fans can join. Wearers need the iOS app with your show code.</div>
      <div class="share-row">
        <span id="shareUrl"></span>
        <button class="copy-btn" onclick="copyWatchLink()">Copy</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="/config.js"></script>
<script>
(function () {
  const RELAY = window.POV_CONFIG?.RELAY_URL || 'wss://pov-relay.onrender.com';

  // ── State ─────────────────────────────────────────────────────────────────
  let ws         = null;
  let showCode   = '';
  let cameras    = new Map();   // camId → { name, canvas, ctx, hasFrame }
  let activeCamId = null;

  // ── Code gate ─────────────────────────────────────────────────────────────
  const gateInput = document.getElementById('gateInput');
  const gateBtn   = document.getElementById('gateBtn');

  // Pre-fill from URL param
  const urlCode = new URLSearchParams(location.search).get('code');
  if (urlCode) {
    gateInput.value = urlCode.toUpperCase();
    gateBtn.disabled = gateInput.value.length < 3;
  }

  gateInput.addEventListener('input', () => {
    gateInput.value = gateInput.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
    gateBtn.disabled = gateInput.value.length < 3;
  });
  gateInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !gateBtn.disabled) enterShow();
  });

  window.enterShow = function () {
    showCode = gateInput.value.trim();
    if (!showCode) return;

    // Update URL without reload
    history.replaceState(null, '', '/director?code=' + showCode);

    // Show dashboard
    document.getElementById('codeGate').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    document.getElementById('navCode').textContent = showCode;
    document.getElementById('navCode').style.display = '';
    document.getElementById('shareUrl').textContent =
      `${location.origin}/watch?code=${showCode}`;
    document.title = `POV · Director · ${showCode}`;

    connect();
  };

  // Auto-enter if code in URL
  if (urlCode) setTimeout(() => { if (gateInput.value.length >= 3) enterShow(); }, 0);

  // ── WebSocket ─────────────────────────────────────────────────────────────
  function connect() {
    if (ws) { try { ws.close(); } catch (_) {} }
    const connDot = document.getElementById('connDot');
    connDot.className = 'conn-dot';

    const url = `${RELAY}/relay?show=${encodeURIComponent(showCode)}&role=director`;
    ws = new WebSocket(url);
    ws.binaryType = 'arraybuffer';

    ws.onopen = () => {
      connDot.className = 'conn-dot connected';
    };

    ws.onmessage = e => {
      if (typeof e.data === 'string') {
        handleControl(JSON.parse(e.data));
        return;
      }
      // Binary frame: [4-byte camId len][camId UTF-8][JPEG]
      handleFrame(e.data);
    };

    ws.onclose = () => {
      connDot.className = 'conn-dot error';
      setTimeout(connect, 3000);
    };
    ws.onerror = () => { connDot.className = 'conn-dot error'; };
  }

  function handleControl(msg) {
    if (msg.type === 'cam_join') {
      addCamera(msg.camId, msg.name);
    } else if (msg.type === 'cam_leave') {
      removeCamera(msg.camId);
    } else if (msg.type === 'audience_count') {
      const pill = document.getElementById('audiencePill');
      document.getElementById('audienceNum').textContent = msg.count;
      pill.style.display = msg.count > 0 ? '' : 'none';
    }
  }

  function handleFrame(buffer) {
    if (buffer.byteLength < 5) return;
    const view   = new DataView(buffer);
    const idLen  = view.getUint32(0, false);          // big-endian
    if (buffer.byteLength < 4 + idLen) return;
    const camId  = new TextDecoder().decode(new Uint8Array(buffer, 4, idLen));
    const jpeg   = new Uint8Array(buffer, 4 + idLen);

    const cam = cameras.get(camId);
    if (!cam) return;

    renderToCanvas(cam.canvas, cam.ctx, jpeg.buffer.slice(jpeg.byteOffset, jpeg.byteOffset + jpeg.byteLength));

    // Mirror to active feed canvas if this is the active cam
    if (camId === activeCamId) {
      const ac  = document.getElementById('activeCanvas');
      const ctx2 = ac.getContext('2d');
      renderToCanvas(ac, ctx2, jpeg.buffer.slice(jpeg.byteOffset, jpeg.byteOffset + jpeg.byteLength));
    }

    if (!cam.hasFrame) {
      cam.hasFrame = true;
      refreshTileBadge(camId);
    }
  }

  function renderToCanvas(canvas, ctx, buffer) {
    const blob = new Blob([buffer], { type: 'image/jpeg' });
    const url  = URL.createObjectURL(blob);
    const img  = new Image();
    img.onload = () => {
      if (canvas.width !== img.naturalWidth) {
        canvas.width  = img.naturalWidth;
        canvas.height = img.naturalHeight;
      }
      ctx.drawImage(img, 0, 0);
      URL.revokeObjectURL(url);
    };
    img.src = url;
  }

  // ── Camera management ─────────────────────────────────────────────────────
  function addCamera(camId, name) {
    if (cameras.has(camId)) return;

    const canvas = document.createElement('canvas');
    const ctx    = canvas.getContext('2d');
    cameras.set(camId, { name, canvas, ctx, hasFrame: false });

    rebuildGrid();
    updateGridLabel();

    // Auto-select first camera
    if (!activeCamId) selectCam(camId);
  }

  function removeCamera(camId) {
    cameras.delete(camId);
    rebuildGrid();
    updateGridLabel();

    if (activeCamId === camId) {
      const next = cameras.keys().next().value || null;
      if (next) selectCam(next);
      else {
        activeCamId = null;
        document.getElementById('activePanel').style.display = 'none';
        document.getElementById('activeLabel').style.display = 'none';
      }
    }
  }

  function selectCam(camId) {
    if (!cameras.has(camId)) return;
    activeCamId = camId;

    // Notify relay
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'select_cam', camId }));
    }

    // Update active panel
    const cam = cameras.get(camId);
    document.getElementById('activePanel').style.display = '';
    document.getElementById('activePanelName').textContent = displayName(cam.name);
    document.getElementById('activeLabel').style.display = '';

    // Refresh tile borders
    document.querySelectorAll('.cam-tile').forEach(t => {
      t.classList.toggle('active', t.dataset.camId === camId);
    });
    document.querySelectorAll('.cam-badge').forEach(b => {
      const cid = b.closest('.cam-tile')?.dataset.camId;
      b.textContent = cid === camId ? 'ON AIR' : 'LIVE';
      b.className = 'cam-badge ' + (cid === camId ? 'on-air' : 'live');
    });
  }

  function rebuildGrid() {
    const grid  = document.getElementById('camGrid');
    const empty = document.getElementById('emptyState');
    grid.innerHTML = '';

    if (cameras.size === 0) {
      empty.style.display = '';
      return;
    }
    empty.style.display = 'none';

    // Set column count
    const cols = cameras.size >= 5 ? 3 : cameras.size >= 3 ? 3 : cameras.size;
    grid.style.gridTemplateColumns = `repeat(${Math.min(cols, 3)}, 1fr)`;

    let i = 1;
    for (const [camId, cam] of cameras) {
      const tile = buildTile(camId, cam, i++);
      grid.appendChild(tile);
    }
  }

  function buildTile(camId, cam, index) {
    const tile = document.createElement('div');
    tile.className = 'cam-tile' + (camId === activeCamId ? ' active' : '');
    tile.dataset.camId = camId;
    tile.onclick = () => selectCam(camId);

    // Number badge
    const num = document.createElement('div');
    num.className = 'cam-num';
    num.textContent = `CAM ${index}`;
    tile.appendChild(num);

    // Canvas
    cam.canvas.className = '';
    tile.appendChild(cam.canvas);

    // Placeholder (shown until first frame)
    if (!cam.hasFrame) {
      const ph = document.createElement('div');
      ph.className = 'placeholder';
      ph.innerHTML = `
        <div class="cam-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
          </svg>
        </div>
      `;
      tile.appendChild(ph);
    }

    // Footer
    const footer = document.createElement('div');
    footer.className = 'cam-footer';
    const nameEl = document.createElement('div');
    nameEl.className = 'cam-name';
    nameEl.textContent = displayName(cam.name);
    const badge = document.createElement('div');
    badge.className = 'cam-badge ' + (camId === activeCamId ? 'on-air' : 'live');
    badge.textContent = camId === activeCamId ? 'ON AIR' : 'LIVE';
    footer.appendChild(nameEl);
    footer.appendChild(badge);
    tile.appendChild(footer);

    return tile;
  }

  function refreshTileBadge(camId) {
    const tile = document.querySelector(`.cam-tile[data-cam-id="${camId}"]`);
    if (!tile) return;
    const ph = tile.querySelector('.placeholder');
    if (ph) ph.remove();
  }

  function updateGridLabel() {
    const n = cameras.size;
    document.getElementById('gridLabel').textContent =
      n === 0 ? 'Waiting for cameras…' : `${n} camera${n !== 1 ? 's' : ''} online`;
  }

  function displayName(name) {
    if (name.startsWith('POV CAM ')) {
      const parts = name.slice('POV CAM '.length).split(' ');
      // Skip 6-char alphanumeric show code
      const start = (parts[0] && /^[A-Z0-9]{4,8}$/.test(parts[0])) ? 1 : 0;
      return parts.slice(start).join(' ') || name;
    }
    return name;
  }

  // ── Share link ────────────────────────────────────────────────────────────
  window.copyWatchLink = function () {
    const url = `${location.origin}/watch?code=${showCode}`;
    navigator.clipboard.writeText(url).then(() => showToast('Link copied!'));
  };

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }
})();
</script>
</body>
</html>
